// ─── ICON HELPER ─────────────────────────────────────────────────────────────
function Icon({ name, size = 16, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && lucide[name]) {
      ref.current.innerHTML = "";
      const el = lucide.createIcons ? null : null;
      const svg = lucide[name]([size, size], { class: className });
      if (typeof svg === "string") ref.current.innerHTML = svg;
      else {
        const icon = document.createElement("span");
        lucide.createIcons({ nameAttr: "data-lucide", attrs: {} });
        ref.current.innerHTML = `<i data-lucide="${name.toLowerCase()}" style="width:${size}px;height:${size}px"></i>`;
        lucide.createIcons({ nodes: ref.current.querySelectorAll("[data-lucide]") });
      }
    }
  }, [name, size]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width:size,height:size}} />;
}

// ─── GENERATE AI SUMMARY ─────────────────────────────────────────────────────
function generateAISummary(client, visita) {
  const nombre = client.nombre.split(" ")[0];
  const tutor = client.contactoNombre.split(" ")[0];
  const usabilidad = visita.usabilidad;
  const notas = visita.notas;
  
  let usabilidadText = "";
  if (usabilidad === "Se comió directo") usabilidadText = "disfrutó de su menú de forma completamente autónoma";
  else if (usabilidad === "Emplatado en formato catering familiar") usabilidadText = "optó por emplatar el menú en casa, como le gusta";
  else usabilidadText = "contó con el apoyo de nuestro repartidor para disfrutar de su comida";
  
  const estrellas = Math.round((visita.sabor + visita.textura + visita.apariencia) / 3);
  const valoracion = estrellas >= 4 ? "¡Las valoraciones del menú han sido muy positivas!" : "El menú ha sido valorado con normalidad.";
  
  return `Hola ${tutor}, hoy hemos visitado a ${nombre} y ${usabilidadText}. ${notas.charAt(0).toUpperCase() + notas.slice(1)} ${valoracion} Mañana continuaremos cuidándole con el mismo cariño. 💛`;
}

// ─── LOGISTICS MODULE ────────────────────────────────────────────────────────
function LogisticaModule({ clients }) {
  const [timerActive, setTimerActive] = useState(false);
  const [timerVal, setTimerVal] = useState(0);
  const [selectedClient, setSelectedClient] = useState(null);
  const [alertaPlato, setAlertaPlato] = useState(null);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (timerActive) {
      intervalRef.current = setInterval(() => setTimerVal(v => v+1), 1000);
    } else clearInterval(intervalRef.current);
    return () => clearInterval(intervalRef.current);
  }, [timerActive]);

  const formatTimer = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const timerColor = timerVal >= 900 ? "var(--verde)" : timerVal >= 600 ? "#f59e0b" : "var(--granate)";
  const timerPct = Math.min(timerVal / 1200 * 100, 100);

  const checkPlato = (plato, client) => {
    if (client && client.alertas.includes("Disfagia") && !plato.apto_disfagia) {
      setAlertaPlato({ plato, client });

  return (
    <div className="fade-in">

      {alertaPlato && (
        <div className="alerta-critica-pulse p-4 mb-4 flex items-start gap-3">

            <div style={{fontWeight:700,fontSize:"15px"}}>⛔ PELIGRO: INCOMPATIBILIDAD CLÍNICA DETECTADA</div>

              <strong>{alertaPlato.client.nombre}</strong> tiene <strong>DISFAGIA</strong> activa. 
              El plato "<strong>{alertaPlato.plato.nombre}</strong>" (textura: {alertaPlato.plato.textura}) <strong>NO es apto</strong> para este paciente.

            <button onClick={()=>setAlertaPlato(null)} className="mt-2" style={{background:"var(--rojo-alerta)",color:"white",border:"none",borderRadius:"6px",padding:"4px 12px",cursor:"pointer",fontSize:"12px",fontFamily:"'DM Sans',sans-serif"}}>
              Entendido — Cambiar plato

      <div className="grid gap-5" style={{gridTemplateColumns:"1fr 1fr"}}>
        {/* Rutas */}
        <div>
          <h3 style={{fontWeight:700,marginBottom:"12px",fontSize:"15px"}}>🗺 Rutas de Hoy</h3>

            <div key={ruta.id} className="ruta-card">

              <div className="flex gap-4 text-sm" style={{color:"var(--text-soft)"}}>

                  return (

                <span style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",fontWeight:700,color:timerColor}}>{formatTimer(timerVal)}</span>

          <option value="">Sin filtro de cliente</option>
          {clients.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}

      </div>
      <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))"}}>
        {platosDisponibles.map(p => {
          const client = clients.find(c=>c.id===selectedClient);
          const incompatible = client && client.alertas.includes("Disfagia") && !p.apto_disfagia;
          return (
            <div key={p.id} className="card p-4" style={incompatible?{border:"2px solid #ef4444"}:{}}>
              <div className="flex items-start justify-between mb-2">

                <span style={{fontWeight:700,color:"var(--granate)",fontSize:"13px"}}>{p.precio}€</span>
              </div>
              <div className="flex gap-2 flex-wrap">

                {p.apto_disfagia && <span className="badge-ok">Apto disfagia</span>}
              </div>
              {incompatible && (
                <div className="flex items-center gap-1 mt-2 text-xs" style={{color:"var(--rojo-alerta)",fontWeight:600}}>
                  <icons.AlertTriangle size={12} color="var(--rojo-alerta)"/> No apto para {client.nombre}

              )}
              {client && !incompatible && (
                <button className="mt-2 w-full btn-secondary" style={{fontSize:"12px",padding:"5px"}} onClick={()=>checkPlato(p,client)}>

              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── KPI FORM ─────────────────────────────────────────────────────────────────
function KPIModule({ clients, setClients }) {
  const [selectedId, setSelectedId] = useState(clients[0]?.id||1);
  const [temp, setTemp] = useState("65");
  const [usabilidad, setUsabilidad] = useState("Se comió directo");
  const [sabor, setSabor] = useState(0);
  const [textura, setTextura] = useState(0);
  const [apariencia, setApariencia] = useState(0);
  const [notas, setNotas] = useState("");
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    if (!notas || sabor===0) return;
    const visita = { temp:`${temp}°C`, usabilidad, sabor, textura, apariencia, notas, fecha: new Date().toISOString().split("T")[0], generado: true };
    setClients(prev => prev.map(c => c.id===selectedId ? {...c, visitasHoy: [...c.visitasHoy, visita]} : c));
    setSaved(true);
    setTimeout(()=>setSaved(false), 2500);
    setNotas(""); setSabor(0); setTextura(0); setApariencia(0);
  };

  const Stars = ({val, setVal}) => (
    <div className="flex gap-1">
      {[1,2,3,4,5].map(i => (
        <span key={i} className="star" onClick={()=>setVal(i)}>
          <icons.Star size={22} fill={i<=val?"#f59e0b":"none"} color="#f59e0b"/>
        </span>
      ))}
    </div>
  );

  return (
    <div className="fade-in">
      <div className="flex items-center gap-3 mb-6">
        <div style={{background:"var(--granate-pale)",borderRadius:"12px",padding:"10px"}}>
          <icons.ClipboardList size={22}/>
        </div>
        <div>
          <h2 className="font-display text-xl font-bold" style={{color:"var(--granate)"}}>Protocolo Post-Visita</h2>
          <p style={{color:"var(--text-soft)",fontSize:"13px"}}>Registro de KPIs del repartidor tras la visita domiciliaria</p>
        </div>
      </div>

      {saved && (
        <div className="flex items-center gap-2 mb-4 p-3 rounded-xl" style={{background:"var(--verde-pale)",border:"1px solid #6ee7b7",color:"var(--verde)",fontWeight:600}}>
          <icons.Check size={16}/> KPIs guardados. Portal familiar actualizado en tiempo real ✓
        </div>
      )}

      <div className="card p-5 mb-5">
        <div className="grid gap-4" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div style={{gridColumn:"1/-1"}}>
            <label>Cliente visitado</label>
            <select value={selectedId} onChange={e=>setSelectedId(parseInt(e.target.value))}>
              {clients.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
            </select>
          </div>
          <div>
            <label>🌡 Temperatura de entrega (°C)</label>
            <input type="number" value={temp} onChange={e=>setTemp(e.target.value)} placeholder="65"/>
            {parseInt(temp) < 60 && <div className="badge-alerta mt-1" style={{fontSize:"11px"}}>⚠ Temperatura inferior a 60°C — revisar</div>}
          </div>
          <div>
            <label>📦 Usabilidad del envase</label>
            <select value={usabilidad} onChange={e=>setUsabilidad(e.target.value)}>
              <option>Se comió directo</option>
              <option>Emplatado en formato catering familiar</option>
              <option>Necesitó ayuda</option>
            </select>
          </div>
        </div>

        <div className="section-divider"/>

        <div className="grid gap-4" style={{gridTemplateColumns:"1fr 1fr 1fr"}}>
          <div>
            <label style={{marginBottom:"8px"}}>⭐ Sabor</label>
            <Stars val={sabor} setVal={setSabor}/>
          </div>
          <div>
            <label style={{marginBottom:"8px"}}>🥄 Textura</label>
            <Stars val={textura} setVal={setTextura}/>
          </div>
          <div>
            <label style={{marginBottom:"8px"}}>👁 Apariencia</label>
            <Stars val={apariencia} setVal={setApariencia}/>
          </div>
        </div>

        <div className="section-divider"/>

        <div>
          <label>💬 Notas cualitativas — Estado de ánimo y observaciones *</label>
          <textarea value={notas} onChange={e=>setNotas(e.target.value)} rows={4}
            placeholder="Ej: La persona estaba alegre y conversadora. Comió casi todo el plato con ayuda. Preguntó por sus nietos..."
            style={{resize:"vertical"}}/>
          <p style={{fontSize:"11px",color:"var(--text-soft)",marginTop:4}}>
            Estas notas serán procesadas por IA para generar el resumen del Portal Familiar
          </p>
        </div>

        <div className="mt-4">
          <button className="btn-primary" style={{padding:"12px 28px",fontSize:"15px"}} onClick={handleSave}
            disabled={!notas || sabor===0}
            style={{padding:"12px 28px",fontSize:"15px",background:(!notas||sabor===0)?"#cbd5e1":"var(--granate)",color:"white",border:"none",borderRadius:"8px",cursor:(!notas||sabor===0)?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>
            Guardar KPIs y notificar familia
          </button>
        </div>
      </div>

      {/* Historial */}
      <h3 style={{fontWeight:700,marginBottom:"12px",fontSize:"15px"}}>📋 Visitas registradas hoy</h3>
      {clients.filter(c=>c.visitasHoy.length>0).map(c=>(
        <div key={c.id} className="card p-4 mb-3">
          <div className="flex items-center justify-between mb-2">
            <span style={{fontWeight:600}}>{c.nombre}</span>
            <span className="badge-ok">Visitado ✓</span>
          </div>
          {c.visitasHoy.slice(-1).map((v,i)=>(
            <div key={i} style={{fontSize:"13px",color:"var(--text-soft)"}}>
              <span>🌡 {v.temp} · 📦 {v.usabilidad} · ⭐ Sabor: {v.sabor}/5</span>
              <div className="mt-1" style={{fontStyle:"italic"}}>"{v.notas.substring(0,80)}..."</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

          <div className="card p-5">
            <div className="flex items-center gap-3 mb-4">
              <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,var(--granate),#c0394e)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:"20px",fontWeight:700,fontFamily:"'Playfair Display',serif"}}>
                {client.nombre.charAt(0)}
              </div>
              <div>
                <div className="font-display" style={{fontWeight:700,fontSize:"18px"}}>{client.nombre}</div>
                <div style={{color:"var(--text-soft)",fontSize:"13px"}}>{client.edad} años · {client.autonomia}</div>
              </div>
            </div>
            <div style={{background:"var(--pizarra)",borderRadius:"10px",padding:"12px",marginBottom:"12px"}}>
              <div style={{fontSize:"12px",fontWeight:600,color:"var(--text-soft)",marginBottom:"6px"}}>CONTACTO FAMILIAR</div>
              <div style={{fontSize:"13px",fontWeight:600}}>{client.contactoNombre}</div>
              <div style={{fontSize:"13px",color:"var(--text-soft)"}}>{client.contactoTel}</div>
            </div>
            <div>
              <div style={{fontSize:"12px",fontWeight:600,color:"var(--text-soft)",marginBottom:"6px"}}>ALERTAS CLÍNICAS</div>
              <div className="flex gap-2 flex-wrap">
                {client.alertas.length ? client.alertas.map(a=><span key={a} className="badge-alerta">{a}</span>) : <span className="badge-ok">Sin alertas</span>}
              </div>
            </div>
            {client.exclusiones.length > 0 && (
              <div className="mt-3">
                <div style={{fontSize:"12px",fontWeight:600,color:"var(--text-soft)",marginBottom:"6px"}}>EXCLUSIONES ACTIVAS</div>
                <div className="flex gap-2 flex-wrap">
                  {client.exclusiones.map(e=><span key={e} className="badge-warn">{e}</span>)}
                </div>
              </div>
            )}
          </div>

          {/* Resumen IA */}
          <div className="card p-5">
            <div className="flex items-center gap-2 mb-3">
              <icons.Sparkles size={16}/>
              <span style={{fontWeight:700,fontSize:"15px"}}>Resumen Diario IA</span>
            </div>
            {client.visitasHoy.length === 0 ? (
              <div style={{background:"var(--pizarra)",borderRadius:"10px",padding:"16px",color:"var(--text-soft)",fontSize:"13px",textAlign:"center"}}>
                <div style={{fontSize:"24px",marginBottom:"8px"}}>🕐</div>
                Aún no se ha registrado la visita de hoy. Recibirás una notificación en cuanto llegue.
              </div>
            ) : (
              <>
                {aiLoading ? (
                  <div style={{background:"var(--granate-pale)",borderRadius:"12px",padding:"16px",textAlign:"center"}}>
                    <div style={{fontSize:"20px",marginBottom:"6px"}}>✨</div>
                    <div style={{fontSize:"13px",color:"var(--granate)",fontWeight:500}}>Generando resumen personalizado...</div>
                  </div>
                ) : aiText ? (
                  <div style={{background:client.alertas.length?"#fff7ed":"var(--verde-pale)",borderRadius:"12px",padding:"16px",border:"1px solid",borderColor:client.alertas.length?"#fed7aa":"#6ee7b7",fontSize:"14px",lineHeight:"1.6",color:"var(--text-main)"}}>
                    {aiText}
                  </div>
                ) : (
                  <div style={{background:"var(--crema)",borderRadius:"12px",padding:"16px",fontSize:"13px",color:"var(--text-soft)",fontStyle:"italic",lineHeight:"1.6"}}>
                    Pulsa "Generar resumen" para ver el informe de hoy procesado por IA basado en las notas del repartidor.
                  </div>
                )}
                <div className="flex gap-2 mt-3">
                  <button className="btn-primary flex-1" style={{fontSize:"13px",padding:"9px"}} onClick={generateSummary}>
                    ✨ Generar resumen
                  </button>
                  {(aiText || client.visitasHoy.length > 0) && (
                    <button onClick={()=>setShowWhatsApp(true)} style={{background:"#25D366",color:"white",border:"none",borderRadius:"8px",padding:"9px 14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:"13px",display:"flex",alignItems:"center",gap:"6px"}}>
                      <icons.Send size={14}/> WhatsApp
                    </button>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* Preferencias */}
      {client && (
        <div className="card p-5 mt-5">
          <div className="flex items-center gap-2 mb-4">
            <icons.Heart size={16}/>
            <h3 style={{fontWeight:700,fontSize:"15px"}}>Gestión de Preferencias · Buzón Gustos</h3>
          </div>
          <div className="grid gap-5" style={{gridTemplateColumns:"1fr 1fr"}}>
            <div>
              <div style={{fontWeight:600,fontSize:"13px",color:"var(--verde)",marginBottom:"8px"}}>✅ Le gusta</div>
              {client.preferencias.likes.map(item=>(
                <div key={item} className="preference-like">
                  <span style={{fontSize:"13px",fontWeight:500}}>{item}</span>
                  <button onClick={()=>removeLike(item)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626"}}><icons.X size={14}/></button>
                </div>
              ))}
              <div className="flex gap-2 mt-2">
                <input value={newLike} onChange={e=>setNewLike(e.target.value)} placeholder="Añadir plato favorito..." style={{fontSize:"13px"}} onKeyDown={e=>e.key==="Enter"&&addLike()}/>
                <button className="btn-primary" style={{padding:"8px 12px",flexShrink:0}} onClick={addLike}><icons.Plus size={14}/></button>
              </div>
            </div>
            <div>
              <div style={{fontWeight:600,fontSize:"13px",color:"var(--rojo-alerta)",marginBottom:"8px"}}>❌ No le gusta</div>
              {client.preferencias.dislikes.map(item=>(
                <div key={item} className="preference-dislike">
                  <span style={{fontSize:"13px",fontWeight:500}}>{item}</span>
                  <button onClick={()=>removeDislike(item)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626"}}><icons.X size={14}/></button>
                </div>
              ))}
              <div className="flex gap-2 mt-2">
                <input value={newDislike} onChange={e=>setNewDislike(e.target.value)} placeholder="Añadir rechazo..." style={{fontSize:"13px"}} onKeyDown={e=>e.key==="Enter"&&addDislike()}/>
                <button style={{background:"var(--rojo-pale)",color:"var(--rojo-alerta)",border:"1.5px solid #fca5a5",borderRadius:"8px",padding:"8px 12px",flexShrink:0,cursor:"pointer"}} onClick={addDislike}><icons.Plus size={14}/></button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* WhatsApp Modal */}
      {showWhatsApp && client && (
        <div className="modal-overlay" onClick={()=>setShowWhatsApp(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-display font-bold" style={{fontSize:"18px"}}>Vista Previa WhatsApp</h3>
              <button onClick={()=>setShowWhatsApp(false)} style={{background:"none",border:"none",cursor:"pointer"}}><icons.X size={20}/></button>
            </div>
            <div className="whatsapp-mock">
              <div style={{background:"#128C7E",padding:"12px 16px",display:"flex",alignItems:"center",gap:"10px"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700}}>D</div>
                <div><div style={{color:"white",fontWeight:600,fontSize:"14px"}}>DABBAS Servicio</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:"11px"}}>en línea</div></div>
              </div>
              <div style={{padding:"16px",background:"#ece5dd",minHeight:"140px"}}>
                <div className="wabubble">
                  <div style={{fontSize:"11px",color:"#667781",marginBottom:"4px"}}>DABBAS · Informe diario</div>
                  <div style={{lineHeight:"1.5"}}>{whatsappText || generateAISummary(client, client.visitasHoy[client.visitasHoy.length-1])}</div>
                  <div style={{fontSize:"10px",color:"#667781",textAlign:"right",marginTop:"4px"}}>✓✓ {new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
              </div>
            </div>
            <div style={{fontSize:"12px",color:"var(--text-soft)",textAlign:"center",marginTop:"12px"}}>
              Enviado a: {client.contactoNombre} · {client.contactoTel}
            </div>
            <button className="btn-primary w-full mt-3" style={{background:"#25D366",fontSize:"14px",padding:"11px"}} onClick={()=>setShowWhatsApp(false)}>
              ✓ Simulación completada
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [env, setEnv] = useState("interno");
  const [tab, setTab] = useState("gestion");
  const [clients, setClients] = useState(initialClients);

  const tabsInterno = [
    { id: "gestion", label: "Gestión Dietética", icon: <icons.Users size={15}/> },
    { id: "logistica", label: "Logística & COGS", icon: <icons.Package size={15}/> },
    { id: "kpi", label: "Protocolo Post-Visita", icon: <icons.ClipboardList size={15}/> },
  ];

  return (
    <div style={{minHeight:"100vh",background:"var(--pizarra)"}}>
      {/* HEADER */}
      <div style={{background:"white",borderBottom:"1px solid var(--border)",padding:"0 24px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
          <div className="flex items-center gap-3">
            <div style={{background:"var(--granate)",borderRadius:"10px",padding:"8px 12px",display:"flex",alignItems:"center",gap:"6px"}}>
              <span style={{color:"white",fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:"18px",letterSpacing:"1px"}}>DABBAS</span>
            </div>
            <div style={{width:1,height:28,background:"var(--border)"}}/>
            <span style={{fontSize:"13px",color:"var(--text-soft)"}}>Nutrición & Acompañamiento · Bilbao–Mungia</span>
          </div>
          <div className="env-toggle">
            <button className={env==="interno"?"env-btn-active":"env-btn-inactive"} onClick={()=>setEnv("interno")}>
              ⚙ Back-Office
            </button>
            <button className={env==="familiar"?"env-btn-active":"env-btn-inactive"} onClick={()=>setEnv("familiar")}>
              👨‍👩‍👧 Portal Familiar
            </button>
          </div>
        </div>
      </div>

      {/* SUB-NAV (solo interno) */}
      {env === "interno" && (
        <div style={{background:"white",borderBottom:"1px solid var(--border)",padding:"0 24px"}}>
          <div style={{maxWidth:1200,margin:"0 auto",display:"flex",gap:"4px",padding:"8px 0"}}>
            {tabsInterno.map(t=>(
              <button key={t.id} className={tab===t.id?"tab-active":"tab-inactive"} onClick={()=>setTab(t.id)}
                style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px"}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* CONTENT */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"28px 24px"}}>
        {env === "interno" && tab === "gestion" && <OnboardingForm clients={clients} setClients={setClients}/>}
        {env === "interno" && tab === "logistica" && <LogisticaModule clients={clients}/>}
        {env === "interno" && tab === "kpi" && <KPIModule clients={clients} setClients={setClients}/>}
        {env === "familiar" && <PortalFamiliar clients={clients} setClients={setClients}/>}
      </div>

      {/* FOOTER */}
      <div style={{borderTop:"1px solid var(--border)",padding:"16px 24px",marginTop:"40px",textAlign:"center"}}>
        <span style={{fontSize:"12px",color:"var(--text-soft)"}}>
          DABBAS © 2025 · Demo Day Universitario · Prototipo interactivo
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
